name: Apply pet appearance import migration

on:
  push:
    branches:
      - agent/cloud-fox-studio-v0610
    paths:
      - .github/workflows/apply-pet-appearance-import.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cloud-fox-studio-v0610
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply deterministic migration
        run: node scripts/apply-pet-appearance-import.mjs
      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps packages scripts package.json
          git diff --cached --quiet && { echo 'No changes generated.'; exit 1; }
          git commit -m 'feat: add belly modes and Side Panel appearance import'
          git push origin HEAD:agent/cloud-fox-studio-v0610
