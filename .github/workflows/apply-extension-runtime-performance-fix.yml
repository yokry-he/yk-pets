name: Apply extension runtime performance fix

on:
  push:
    branches:
      - agent/cloud-fox-studio-v0610

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cloud-fox-studio-v0610
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply migration
        run: node scripts/apply-extension-runtime-performance-fix.mjs
      - name: Remove one-time migration files
        run: |
          rm scripts/apply-extension-runtime-performance-fix.mjs
          rm .github/workflows/apply-extension-runtime-performance-fix.yml
      - name: Commit generated performance fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: prevent extension runtime page freezes"
          git push origin HEAD:agent/cloud-fox-studio-v0610
