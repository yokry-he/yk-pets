name: Apply belly mode patch semantics fix

on:
  push:
    branches:
      - agent/cloud-fox-studio-v0610
    paths:
      - .github/workflows/apply-belly-mode-test-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cloud-fox-studio-v0610
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-belly-mode-test-fix.mjs
      - name: Commit generated fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/playground/app/domain/pet-appearance-patch.ts scripts/test-pet-studio-local-patches.ts
          git diff --cached --quiet && { echo 'No changes generated.'; exit 1; }
          git commit -m 'fix: switch edited belly geometry to custom mode'
          git push origin HEAD:agent/cloud-fox-studio-v0610
