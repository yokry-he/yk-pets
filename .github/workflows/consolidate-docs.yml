name: Consolidate project documentation

on:
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consolidate:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[system] consolidate YK Pets documentation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore consolidated documentation
        shell: bash
        run: |
          set -euo pipefail

          cat .doc-import/chunk-* | base64 --decode > /tmp/yk-pets-docs.tar.gz
          echo "fb94c0e48bdae14ba357bdd7806522d70871e2945076bb816b681ae0c71ff31f  /tmp/yk-pets-docs.tar.gz" | sha256sum -c -
          tar -xzf /tmp/yk-pets-docs.tar.gz

          rm -f README.zh-CN.md
          rm -f RELEASE-NOTES-v0.7.{3,4,5,6,7,8}.md
          rm -f MIGRATION-v0.7.2-to-v0.7.3.zh-CN.md
          rm -f MIGRATION-v0.7.3-to-v0.7.4.zh-CN.md
          rm -f MIGRATION-v0.7.4-to-v0.7.5.zh-CN.md
          rm -f MIGRATION-v0.7.5-to-v0.7.6.zh-CN.md
          rm -f MIGRATION-v0.7.6-to-v0.7.7.zh-CN.md
          rm -f MIGRATION-v0.7.7-to-v0.7.8.zh-CN.md
          rm -f VALIDATION-v0.7.{3,4,5,6,7,8}.en.md
          rm -f VALIDATION-v0.7.{3,4,5,6,7,8}.zh-CN.md
          rm -f MERGE-INSTRUCTIONS-v0.7.{5,6,7,8}.zh-CN.md
          rm -rf .doc-import

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: consolidate bilingual project documentation"
          git push origin HEAD:main
