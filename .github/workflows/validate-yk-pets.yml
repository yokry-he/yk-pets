name: Validate YK-PETS

on:
  push:
    branches:
      - agent/yk-pets-rebrand-v0610
      - agent/cloud-fox-studio-v0610
  pull_request:

permissions:
  contents: write

jobs:
  migrate-pet-memory:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/cloud-fox-studio-v0610' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/cloud-fox-studio-v0610
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply Pet Memory MVP
        run: node scripts/apply-pet-memory-mvp.mjs

      - name: Remove one-time migration and restore validation workflow
        run: |
          rm scripts/apply-pet-memory-mvp.mjs
          rm .github/workflows/apply-pet-memory-mvp.yml
          git show HEAD^:.github/workflows/validate-yk-pets.yml > .github/workflows/validate-yk-pets.yml

      - name: Commit generated Pet Memory MVP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add local-first Pet Memory MVP"
          git push origin HEAD:agent/cloud-fox-studio-v0610

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check YK-PETS brand and identity
        run: pnpm check:brand

      - name: Check Cloud Fox Studio contract
        run: pnpm check:cloud-fox-studio

      - name: Typecheck workspaces
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > /tmp/yk-pets-typecheck.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 180 /tmp/yk-pets-typecheck.log
          fi
          exit "$status"

      - name: Upload typecheck failure log
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: yk-pets-typecheck-errors
          path: /tmp/yk-pets-typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Run tests
        run: pnpm test

      - name: Build Local Agent and extension
        run: pnpm build

      - name: Build Playground
        run: pnpm build:playground
