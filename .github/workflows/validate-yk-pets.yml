name: Validate YK-PETS

on:
  push:
    branches:
      - agent/yk-pets-rebrand-v0610
      - agent/cloud-fox-studio-v0610
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Commit refreshed lockfile
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh lockfile for pet-core workspaces"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Check YK-PETS brand and identity
        run: pnpm check:brand

      - name: Check Cloud Fox Studio contract
        run: pnpm check:cloud-fox-studio

      - name: Typecheck workspaces
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > /tmp/yk-pets-typecheck.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 180 /tmp/yk-pets-typecheck.log
          fi
          exit "$status"

      - name: Upload typecheck failure log
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: yk-pets-typecheck-errors
          path: /tmp/yk-pets-typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Run tests
        run: pnpm test

      - name: Build Local Agent and extension
        run: pnpm build

      - name: Build Playground
        run: pnpm build:playground
